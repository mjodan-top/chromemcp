<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Vocab - 足球单词</title>
    <meta name="description" content="通过足球游戏学习英语单词">
    <style>
        /* CSS Variables */
        :root {
            --primary-green: #2d5a27;
            --light-green: #4a7c43;
            --sky-blue: #87CEEB;
            --grass-light: #5a8f3e;
            --grass-dark: #3d6b2a;
            --white: #ffffff;
            --gold: #FFD700;
            --red: #e74c3c;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--sky-blue) 30%, var(--grass-light) 30%, var(--grass-dark) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 40px var(--shadow);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--light-green) 100%);
            color: var(--white);
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px var(--shadow);
        }

        .header .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: var(--primary-green);
            border-bottom: 3px solid var(--gold);
        }

        .nav-tab {
            flex: 1;
            padding: 15px 10px;
            background: transparent;
            border: none;
            color: var(--white);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-tab.active {
            background: var(--light-green);
            font-weight: bold;
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gold);
        }

        /* Game Area */
        .game-area {
            padding: 30px;
            min-height: 400px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Canvas Styling */
        #gameCanvas {
            width: 100%;
            height: 300px;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--sky-blue) 40%, var(--grass-light) 40%, var(--grass-dark) 100%);
            border-radius: 10px;
            border: 3px solid var(--primary-green);
            display: block;
            margin-bottom: 20px;
        }

        /* Word Card */
        .word-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid var(--primary-green);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .word-card .word {
            font-size: 2rem;
            color: var(--primary-green);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .word-card .phonetic {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
        }

        .word-card .hint {
            font-size: 1rem;
            color: #888;
            font-style: italic;
        }

        /* Option Buttons */
        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid var(--primary-green);
            border-radius: 10px;
            background: var(--white);
            color: var(--primary-green);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            background: var(--primary-green);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px var(--shadow);
        }

        .option-btn.correct {
            background: var(--grass-light);
            border-color: var(--grass-light);
            color: var(--white);
        }

        .option-btn.wrong {
            background: var(--red);
            border-color: var(--red);
            color: var(--white);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: #333;
        }

        .status-item .label {
            font-weight: bold;
            color: var(--primary-green);
        }

        .status-item .value {
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: bold;
        }

        /* Timer Bar */
        .timer-container {
            padding: 0 30px 20px;
        }

        .timer-bar {
            width: 100%;
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--grass-light) 0%, var(--gold) 100%);
            border-radius: 5px;
            transition: width 0.1s linear;
        }

        .timer-progress.warning {
            background: linear-gradient(90deg, var(--gold) 0%, var(--red) 100%);
        }

        .timer-progress.danger {
            background: var(--red);
        }

        .timer-text {
            text-align: center;
            margin-top: 8px;
            font-size: 0.9rem;
            color: #666;
        }

        /* Responsive Design for Mobile */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .game-container {
                border-radius: 15px;
            }

            .header {
                padding: 15px 20px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .header .subtitle {
                font-size: 0.9rem;
            }

            .nav-tab {
                padding: 12px 8px;
                font-size: 0.9rem;
            }

            .game-area {
                padding: 20px;
                min-height: 350px;
            }

            #gameCanvas {
                height: 200px;
            }

            .word-card {
                padding: 20px;
            }

            .word-card .word {
                font-size: 1.5rem;
            }

            .word-card .phonetic {
                font-size: 1rem;
            }

            .word-card .hint {
                font-size: 0.9rem;
            }

            .options-container {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .option-btn {
                padding: 12px 15px;
                font-size: 1rem;
            }

            .status-bar {
                padding: 12px 20px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .status-item {
                font-size: 0.9rem;
            }

            .status-item .value {
                font-size: 1rem;
            }

            .timer-container {
                padding: 0 20px 15px;
            }
        }
    </style>
</head>
