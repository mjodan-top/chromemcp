<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Football Vocab - 足球单词</title>
    <meta name="description" content="通过足球游戏学习英语单词">
    <style>
        /* CSS Variables */
        :root {
            --primary-green: #2d5a27;
            --light-green: #4a7c43;
            --sky-blue: #87CEEB;
            --grass-light: #5a8f3e;
            --grass-dark: #3d6b2a;
            --white: #ffffff;
            --gold: #FFD700;
            --red: #e74c3c;
            --shadow: rgba(0, 0, 0, 0.3);
        }

        /* Base Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--sky-blue) 30%, var(--grass-light) 30%, var(--grass-dark) 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            padding: 20px;
        }

        .game-container {
            width: 100%;
            max-width: 800px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 10px 40px var(--shadow);
            overflow: hidden;
        }

        /* Header */
        .header {
            background: linear-gradient(135deg, var(--primary-green) 0%, var(--light-green) 100%);
            color: var(--white);
            padding: 20px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2rem;
            margin-bottom: 5px;
            text-shadow: 2px 2px 4px var(--shadow);
        }

        .header .subtitle {
            font-size: 1rem;
            opacity: 0.9;
        }

        /* Navigation Tabs */
        .nav-tabs {
            display: flex;
            background: var(--primary-green);
            border-bottom: 3px solid var(--gold);
        }

        .nav-tab {
            flex: 1;
            padding: 15px 10px;
            background: transparent;
            border: none;
            color: var(--white);
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
        }

        .nav-tab:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .nav-tab.active {
            background: var(--light-green);
            font-weight: bold;
        }

        .nav-tab.active::after {
            content: '';
            position: absolute;
            bottom: -3px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gold);
        }

        /* Game Area */
        .game-area {
            padding: 30px;
            min-height: 400px;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }

        /* Canvas Styling */
        #gameCanvas {
            width: 100%;
            height: 300px;
            background: linear-gradient(180deg, var(--sky-blue) 0%, var(--sky-blue) 40%, var(--grass-light) 40%, var(--grass-dark) 100%);
            border-radius: 10px;
            border: 3px solid var(--primary-green);
            display: block;
            margin-bottom: 20px;
        }

        /* Word Card */
        .word-card {
            background: linear-gradient(135deg, #f8f9fa 0%, #e9ecef 100%);
            border-radius: 15px;
            padding: 25px;
            text-align: center;
            margin-bottom: 20px;
            border: 2px solid var(--primary-green);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .word-card .word {
            font-size: 2rem;
            color: var(--primary-green);
            font-weight: bold;
            margin-bottom: 10px;
        }

        .word-card .phonetic {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 10px;
        }

        .word-card .hint {
            font-size: 1rem;
            color: #888;
            font-style: italic;
        }

        /* Option Buttons */
        .options-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .option-btn {
            padding: 15px 20px;
            font-size: 1.1rem;
            border: 2px solid var(--primary-green);
            border-radius: 10px;
            background: var(--white);
            color: var(--primary-green);
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .option-btn:hover {
            background: var(--primary-green);
            color: var(--white);
            transform: translateY(-2px);
            box-shadow: 0 4px 10px var(--shadow);
        }

        .option-btn.correct {
            background: var(--grass-light);
            border-color: var(--grass-light);
            color: var(--white);
        }

        .option-btn.wrong {
            background: var(--red);
            border-color: var(--red);
            color: var(--white);
        }

        .option-btn:disabled {
            cursor: not-allowed;
            opacity: 0.7;
        }

        /* Status Bar */
        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 30px;
            background: #f8f9fa;
            border-top: 1px solid #e9ecef;
        }

        .status-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 1rem;
            color: #333;
        }

        .status-item .label {
            font-weight: bold;
            color: var(--primary-green);
        }

        .status-item .value {
            font-size: 1.2rem;
            color: var(--gold);
            font-weight: bold;
        }

        /* Timer Bar */
        .timer-container {
            padding: 0 30px 20px;
        }

        .timer-bar {
            width: 100%;
            height: 10px;
            background: #e9ecef;
            border-radius: 5px;
            overflow: hidden;
        }

        .timer-progress {
            height: 100%;
            background: linear-gradient(90deg, var(--grass-light) 0%, var(--gold) 100%);
            border-radius: 5px;
            transition: width 0.1s linear;
        }

        .timer-progress.warning {
            background: linear-gradient(90deg, var(--gold) 0%, var(--red) 100%);
        }

        .timer-progress.danger {
            background: var(--red);
        }

        .timer-text {
            text-align: center;
            margin-top: 8px;
            font-size: 0.9rem;
            color: #666;
        }

        /* Responsive Design for Mobile */
        @media (max-width: 480px) {
            body {
                padding: 10px;
            }

            .game-container {
                border-radius: 15px;
            }

            .header {
                padding: 15px 20px;
            }

            .header h1 {
                font-size: 1.5rem;
            }

            .header .subtitle {
                font-size: 0.9rem;
            }

            .nav-tab {
                padding: 12px 8px;
                font-size: 0.9rem;
            }

            .game-area {
                padding: 20px;
                min-height: 350px;
            }

            #gameCanvas {
                height: 200px;
            }

            .word-card {
                padding: 20px;
            }

            .word-card .word {
                font-size: 1.5rem;
            }

            .word-card .phonetic {
                font-size: 1rem;
            }

            .word-card .hint {
                font-size: 0.9rem;
            }

            .options-container {
                grid-template-columns: 1fr;
                gap: 10px;
            }

            .option-btn {
                padding: 12px 15px;
                font-size: 1rem;
            }

            .status-bar {
                padding: 12px 20px;
                flex-wrap: wrap;
                gap: 10px;
            }

            .status-item {
                font-size: 0.9rem;
            }

            .status-item .value {
                font-size: 1rem;
            }

            .timer-container {
                padding: 0 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- Header -->
        <header class="header">
            <h1>⚽ Football Vocab</h1>
            <div class="subtitle">足球单词 - 通过游戏学习英语</div>
        </header>

        <!-- Navigation Tabs -->
        <nav class="nav-tabs">
            <button class="nav-tab active" data-mode="practice" onclick="switchMode('practice')">训练</button>
            <button class="nav-tab" data-mode="shooting" onclick="switchMode('shooting')">射门</button>
            <button class="nav-tab" data-mode="levels" onclick="switchMode('levels')">闯关</button>
            <button class="nav-tab" data-mode="vocabulary" onclick="switchMode('vocabulary')">词库</button>
        </nav>

        <!-- Game Area -->
        <main class="game-area" id="gameArea">
            <!-- Practice Mode -->
            <div id="practiceTab" class="tab-content active">
                <canvas id="gameCanvas" width="800" height="300"></canvas>

                <div class="word-card">
                    <div class="word" id="wordDisplay">Welcome</div>
                    <div class="phonetic" id="phonetic">/ˈwelkəm/</div>
                    <button class="speak-btn" onclick="speakWord()" title="播放发音">🔊</button>
                    <div class="hint" id="example" style="margin-top: 10px;">Welcome to Football Vocab!</div>
                </div>

                <div class="options-container" id="optionsContainer">
                    <button class="option-btn" onclick="selectOption(0)">欢迎</button>
                    <button class="option-btn" onclick="selectOption(1)">再见</button>
                    <button class="option-btn" onclick="selectOption(2)">谢谢</button>
                    <button class="option-btn" onclick="selectOption(3)">对不起</button>
                </div>
            </div>

            <!-- Shooting Mode -->
            <div id="shootingTab" class="tab-content">
                <div class="timer-container">
                    <div class="timer-bar">
                        <div class="timer-progress" id="timerProgress" style="width: 100%;"></div>
                    </div>
                    <div class="timer-text">剩余时间: <span id="timeLeft">90</span> 秒</div>
                </div>

                <canvas id="shootingCanvas" width="800" height="300"></canvas>

                <div class="word-card">
                    <div class="word" id="shootingWordDisplay">Ready?</div>
                    <div class="phonetic" id="shootingPhonetic"></div>
                    <button class="speak-btn" onclick="speakWord()" title="播放发音">🔊</button>
                </div>

                <div class="options-container" id="shootingOptionsContainer">
                    <button class="option-btn" onclick="selectOption(0)">准备</button>
                    <button class="option-btn" onclick="selectOption(1)">开始</button>
                    <button class="option-btn" onclick="selectOption(2)">结束</button>
                    <button class="option-btn" onclick="selectOption(3)">暂停</button>
                </div>
            </div>

            <!-- Levels Mode -->
            <div id="levelsTab" class="tab-content">
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="font-size: 1.2rem; color: var(--primary-green); font-weight: bold;">
                        关卡 <span id="levelDisplay">1</span> / 10
                    </div>
                    <div style="font-size: 0.9rem; color: #666; margin-top: 5px;">
                        连续答对 <span id="levelProgress">0</span> / <span id="levelRequired">3</span> 题
                    </div>
                </div>

                <canvas id="levelsCanvas" width="800" height="300"></canvas>

                <div class="word-card">
                    <div class="word" id="levelsWordDisplay">Level 1</div>
                    <div class="phonetic" id="levelsPhonetic"></div>
                    <button class="speak-btn" onclick="speakWord()" title="播放发音">🔊</button>
                </div>

                <div class="options-container" id="levelsOptionsContainer">
                    <button class="option-btn" onclick="selectOption(0)">选项A</button>
                    <button class="option-btn" onclick="selectOption(1)">选项B</button>
                    <button class="option-btn" onclick="selectOption(2)">选项C</button>
                    <button class="option-btn" onclick="selectOption(3)">选项D</button>
                </div>
            </div>

            <!-- Vocabulary Mode -->
            <div id="vocabularyTab" class="tab-content">
                <div style="text-align: center; padding: 40px;">
                    <h3 style="color: var(--primary-green); margin-bottom: 20px;">📚 词库管理</h3>
                    <p style="color: #666;">管理您的单词和查看错题本</p>
                    <div id="vocabularyContent" style="margin-top: 30px;">
                        <!-- Content will be loaded by JavaScript -->
                    </div>
                </div>
            </div>
        </main>

        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">
                <span class="label">⭐ 得分:</span>
                <span class="value" id="score">0</span>
            </div>
            <div class="status-item" id="streakItem">
                <span class="label">🔥 连胜:</span>
                <span class="value" id="streak">0</span>
            </div>
            <div class="status-item">
                <span class="label">📊</span>
                <button onclick="showStats()" style="background: none; border: none; color: var(--primary-green); cursor: pointer; font-weight: bold;">查看统计</button>
            </div>
        </div>
    </div>

    <script>
        // JavaScript will be added in Task 4+
    </script>
</body>
</html>
